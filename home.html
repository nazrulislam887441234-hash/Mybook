<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 70px; }
        header { background: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.logo { font-size: 20px; font-weight: bold; color: #007bff; display: flex; align-items: center; gap: 8px; }
.header-links { display: flex; gap: 6px; }
.header-links a { padding: 6px 10px; background: #f0f2f5; color: #007bff; text-decoration: none; border-radius: 15px; font-size: 12px; font-weight: bold; }
.header-links a:hover { background: #007bff; color: white; }
.tab-bar { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 56px; z-index: 99; }
.tab-btn { flex: 1; padding: 14px; border: none; background: none; font-size: 16px; font-weight: bold; cursor: pointer; color: #555; text-decoration: none; text-align: center; }
.tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; }
.filter-box { padding: 10px; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 110px; z-index: 98; }
        select { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
.story-section { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: white; margin-bottom: 10px; }
.story { width: 80px; height: 120px; border-radius: 10px; background: #ddd; flex-shrink: 0; border: 2px solid #007bff; background-size: cover; background-position: center; }
.post-card { background: white; margin-bottom: 15px; padding: 15px; }
.post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.post-img { width: 100%; border-radius: 10px; margin-top: 10px; }
.ad-card { background: white; margin-bottom: 15px; padding: 10px; border: 1px dashed #ccc; text-align: center; display:flex; justify-content:center; align-items:center; flex-direction:column; min-height:100px; }
.ad-label { font-size: 12px; color: #777; margin-bottom: 8px; text-align:center; width:100%; font-weight:bold; }
.creator-ad { margin: 10px 0; padding: 12px; background: #fff8e1; border-radius: 10px; border: 1px solid #ffe082; min-height:100px; }
.stats-bar { display:flex; justify-content: space-between; padding: 8px 15px; font-size:14px; color:#555; border-bottom: 1px solid #eee; }
.action-bar { display:flex; justify-content: space-around; padding: 5px 0; }
.action-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:8px; border:none; background:none; cursor:pointer; padding:8px; border-radius:8px; font-size:15px; font-weight:600; color:#555; }
.action-btn:hover { background: #f0f2f5; }
.action-btn.liked { color: #1877f2; }
.nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); z-index: 99; }
.nav-btn { font-size: 22px; cursor: pointer; color: #555; }
.full-loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:9999; }
.loader { width: 50px; height: 50px; border: 5px solid #ddd; border-top: 5px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<audio id="likeSound"><source src="like.mp3" type="audio/mpeg"></audio>

<div class="full-loader" id="fullLoader">
    <div class="loader"></div>
    <p style="margin-top:15px; font-weight:bold;">My Book Loading...</p>
</div>

<header>
    <div class="logo"><img src="https://i.ibb.co.com/FqYZrjH3/20260609-103856.png" width="30"> My Book</div>
    <div class="header-links">
        <a href="terms&condition.html">Terms</a>
        <a href="privacy-policy.html">Privacy</a>
        <a href="support.html">Support</a>
    </div>
</header>

<div class="tab-bar">
    <a href="foryou.html" class="tab-btn active">For You</a>
    <a href="following.html" class="tab-btn">Following</a>
</div>

<div class="filter-box">
    <select id="categoryFilter" onchange="filterPosts()">
        <option value="All">All Categories</option>
        <option value="Tech">Tech</option><option value="News">News</option>
        <option value="Vlog">Vlog</option><option value="Gaming">Gaming</option>
        <option value="Travel">Travel</option><option value="Entertainment">Entertainment</option>
        <option value="Movie">Movie</option><option value="Natok">Natok</option>
        <option value="Funny">Funny</option><option value="Sports">Sports</option>
        <option value="Food & Recipe">Food & Recipe</option><option value="Education">Education</option>
        <option value="Islamic">Islamic</option><option value="Life Style">Life Style</option>
        <option value="Business & Money">Business & Money</option><option value="Freelancing">Freelancing</option>
    </select>
</div>
<div class="story-section" id="stories"></div>
<div id="feed"></div>

<div class="nav-bar">
    <div class="nav-btn" onclick="window.location.href='foryou.html'"><i class="fa-solid fa-house"></i></div>
    <div class="nav-btn" onclick="window.location.href='post.html'"><i class="fa-solid fa-plus"></i></div>
    <div class="nav-btn" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i></div>
    <div class="nav-btn" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i></div>
    <div class="nav-btn" onclick="window.location.href='https://ghotimarket.com'"><i class="fa-solid fa-store"></i></div>
     <div class="nav-btn" onclick="window.location.href='notification.html'"><i class="fa-solid fa-bell"></i></div/>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
    getFirestore,
    collection,
    getDocs,
    getDoc,
    addDoc,
    serverTimestamp,
    onSnapshot,
    query,
    orderBy,
    limit,
    startAfter,
    doc,
    updateDoc,
    arrayUnion,
    arrayRemove
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw", authDomain: "mybook-95b97.firebaseapp.com", projectId: "mybook-95b97", storageBucket: "mybook-95b97.firebasestorage.app", messagingSenderId: "689741505296", appId: "1:689741505296:web:818d83962a0825f64a7b95" };
const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth();
let allPostsBuffer = []; let displayedCount = 0; const POSTS_PER_LOAD = 5; const FETCH_LIMIT = 20;
let currentUserId = ""; let followingList = []; let lastDoc = null; let isLoading = false; let currentCategory = "All";
let viewTimers = {}; let adsData = []; let userDataCache = {}; let viewedPosts = new Set();

onAuthStateChanged(auth, async (user) => {
    if (!user) window.location.href = 'index.html';
    else {
        currentUserId = user.uid;
        await loadAds();
        await loadStories();
        await loadFeed(true);
        document.getElementById('fullLoader').style.display = 'none';
    }
});

async function loadAds(){
    const adsSnap = await getDocs(collection(db, "ads"));
    adsData = [];
    adsSnap.forEach(doc => adsData.push({id: doc.id,...doc.data()}));
}

async function loadStories() {
    const storySection = document.getElementById('stories');
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(5));
    const snap = await getDocs(q);
    storySection.innerHTML = "";
    snap.forEach((docSnap) => { const p = docSnap.data(); storySection.innerHTML += `<div class="story" style="background-image:url('${p.imageUrl}')"></div>`; });
}

async function getUserData(uid){
    if(!userDataCache[uid]){
        const snap = await getDoc(doc(db, "users", uid));
        userDataCache[uid] = snap.data();
    }
    return userDataCache[uid];
}

window.loadFeed = async function(isInitial = false) {
    if(isLoading) return; isLoading = true;
    const userDoc = await getDoc(doc(db, "users", currentUserId));
    followingList = userDoc.data()?.following || [];

    let q;
    if(lastDoc){ q = query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastDoc), limit(FETCH_LIMIT)); }
    else { q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(FETCH_LIMIT)); }

    const snap = await getDocs(q);
    if(snap.empty) { if(isInitial) document.getElementById("feed").innerHTML = `<p style="text-align:center;padding:40px;">কোনো পোস্ট নেই</p>`; lastDoc = null; isLoading = false; return; }
    lastDoc = snap.docs[snap.docs.length - 1];

    snap.forEach((docSnap) => {
        const p = docSnap.data();
        p.category = p.category || "Uncategorized";
        if(p.uid!== currentUserId){
            if(!allPostsBuffer.find(x => x.id === docSnap.id)){
                allPostsBuffer.push({id: docSnap.id,...p});
            }
        }
    });

    allPostsBuffer.forEach(p => {
        const postTime = p.createdAt?.seconds * 1000 || 0;
        const isNew = (Date.now() - postTime) < 3600000;
        const newBoost = isNew? 2 : 1;
        p.engagement = ((p.likes?.length || 0) * 5 + (p.commentsCount || 0) * 10 + (p.views?.length || 0) * 0.2 + (followingList.includes(p.uid)? 50 : 0)) * newBoost;
    });

    let viralPosts = [...allPostsBuffer].sort((a, b) => b.engagement - a.engagement).slice(0, 14);
    let newPosts = [...allPostsBuffer].sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).slice(0, 6);
    allPostsBuffer = [...viralPosts,...newPosts];
    allPostsBuffer = allPostsBuffer.filter((v,i,a)=>a.findIndex(t=>(t.id === v.id))===i);

    renderAndFilter();
    isLoading = false;
};

function renderAndFilter(){
    const feed = document.getElementById("feed");
    if(displayedCount === 0) feed.innerHTML = "";
    let filteredPosts = allPostsBuffer;
    if(currentCategory!== "All"){ filteredPosts = allPostsBuffer.filter(p => p.category === currentCategory); }
    const postsToShow = filteredPosts.slice(displayedCount, displayedCount + POSTS_PER_LOAD);
    if(postsToShow.length === 0 && displayedCount === 0){ feed.innerHTML = `<p style="text-align:center;padding:40px;">এই Category তে কোনো পোস্ট নেই</p>`; return; }
    renderPosts(postsToShow);
    displayedCount += POSTS_PER_LOAD;
}

async function renderPosts(posts){
    const feed = document.getElementById("feed");
    let htmlToAdd = '';

    for(let i = 0; i < posts.length; i++){
        const p = posts[i];
        const postId = p.id;
        const globalIndex = displayedCount + i;
        const isLiked = p.likes?.includes(currentUserId);
        const likeCount = p.likes?.length || 0;
        const commentCount = p.commentsCount || 0;
        const viewCount = p.views?.length || 0;
        const isFollowing = followingList.includes(p.uid);

        const userData = await getUserData(p.uid);
        const isMonetized = userData?.isMonetized || false;

        let monetizeAdHtml = '';
        if(isMonetized && adsData.length > 0){
            monetizeAdHtml = `
            <div class="creator-ad">
                <div class="ad-label"><i class="fa-solid fa-circle-check" style="color:green"></i> Sponsored</div>
                <div id="creator-ad-${postId}"></div>
            </div>`;
        }

        htmlToAdd += `
        <div class="post-card" id="post-${postId}" data-postid="${postId}">
            <div class="post-header" onclick="window.location.href='user-profile.html?uid=${p.uid}'" style="cursor:pointer;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <img src="${p.userPhoto}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                    <b>${p.userName}</b>
                </div>
                <button id="followBtn-${p.uid}" onclick="event.stopPropagation(); followUser('${p.uid}')"
                    style="background:${isFollowing? '#ccc' : '#007bff'}; color:white; border:none; padding:6px 15px; border-radius:15px; font-weight:bold;">
                    ${isFollowing? 'Following' : 'Follow'}
                </button>
            </div>
            <p>${p.caption}</p>
            <img src="${p.imageUrl}" class="post-img" ondblclick="handleLike('${postId}', true)">
            ${monetizeAdHtml}
            <div class="stats-bar">
                <span id="likeCount-${postId}"><i class="fa-solid fa-thumbs-up" style="color:#1877f2"></i> ${likeCount}</span>
                <span id="viewCount-${postId}">${commentCount} Comments • ${viewCount} Views</span>
            </div>
            <div class="action-bar">
                <button id="likeBtn-${postId}" onclick="handleLike('${postId}')" class="action-btn ${isLiked? 'liked' : ''}">
                    <i class="${isLiked? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i> Like
                </button>
                <button onclick="window.location.href='comments.html?id=${postId}'" class="action-btn">
                    <i class="fa-regular fa-comment"></i> Comment
                </button>
                <button class="action-btn">
                    <i class="fa-solid fa-share"></i> Share
                </button>
            </div>
        </div>`;

        // ✅ প্রতি 5টা পোস্ট পর Global Ad
        if((globalIndex + 1) % 5 === 0 && adsData.length > 0){
            htmlToAdd += `
            <div class="ad-card">
                <div class="ad-label">Sponsored</div>
                <div id="global-ad-${globalIndex}"></div>
            </div>`;
        }

        listenToViewCount(postId);
    }

    feed.insertAdjacentHTML('beforeend', htmlToAdd);

    posts.forEach((p, i) => {
        const postId = p.id;
        const globalIndex = displayedCount + i;
        const userData = userDataCache[p.uid];

        if(userData?.isMonetized && adsData.length > 0){
            setTimeout(() => runAdScript(`creator-ad-${postId}`), 300);
        }
        if((globalIndex + 1) % 5 === 0 && adsData.length > 0){
            setTimeout(() => runAdScript(`global-ad-${globalIndex}`), 300);
        }

        setTimeout(() => {
            const el = document.getElementById(`post-${postId}`);
            if(el) viewObserver.observe(el);
        }, 500)
    });
}

// ✅ নতুন ফাংশন: Script Force করে Run করবে
function runAdScript(slotId){
    const slot = document.getElementById(slotId);
    if(!slot || adsData.length === 0) return;

    const randomAd = adsData[Math.floor(Math.random() * adsData.length)];
    const adCode = randomAd.script;

    slot.innerHTML = adCode; // আগে html বসাও

    // তারপর সব <script> tag খুজে বের করে আবার append করো
    Array.from(slot.getElementsByTagName("script")).forEach(oldScript => {
        const newScript = document.createElement("script");
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
        oldScript.parentNode.replaceChild(newScript, oldScript);
    });
}

function listenToViewCount(postId){
    const postRef = doc(db, "posts", postId);
    onSnapshot(postRef, (docSnap) => {
        if(docSnap.exists()){
            const data = docSnap.data();
            const realViewCount = data.views?.length || 0;
            const viewSpan = document.getElementById(`viewCount-${postId}`);
            if(viewSpan){
                const comments = viewSpan.innerText.split('•')[0].trim();
                viewSpan.innerText = `${comments} • ${realViewCount} Views`;
            }
        }
    });
}

const viewObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const postId = entry.target.dataset.postid;
        if (entry.isIntersecting &&!viewedPosts.has(postId)) {
            viewTimers[postId] = setTimeout(() => {
                addView(postId);
                viewedPosts.add(postId);
                viewObserver.unobserve(entry.target);
            }, 800);
        } else {
            clearTimeout(viewTimers[postId]);
        }
    });
}, { threshold: 0.3 });

window.addView = async (postId) => {
    const postRef = doc(db, "posts", postId);
    await updateDoc(postRef, {
        views: arrayUnion(currentUserId)
    });
};

window.handleLike = async (postId, isDoubleTap = false) => {
    const postRef = doc(db, "posts", postId);
    const btn = document.getElementById(`likeBtn-${postId}`);
    const postSnap = await getDoc(postRef);
    const likes = postSnap.data().likes || [];
    let isLikedNow = likes.includes(currentUserId);

    if (!isLikedNow) {

        await updateDoc(postRef, {
            likes: arrayUnion(currentUserId)
        });

        // Notification পাঠাও
        const postData = postSnap.data();

        if (postData.uid !== currentUserId) {
            const mySnap = await getDoc(doc(db, "users", currentUserId));
            const myData = mySnap.data();

            await addDoc(collection(db, "notifications"), {
                to: postData.uid,
                type: "like",
                from: currentUserId,
                fromName: myData.name,
                fromPhoto: myData.profile,
                text: "liked your post",
                postId: postId,
                read: false,
                createdAt: serverTimestamp()
            });
        }

        isLikedNow = true;
        document.getElementById("likeSound").play();

    } else if (!isDoubleTap) {

        await updateDoc(postRef, {
            likes: arrayRemove(currentUserId)
        });

        isLikedNow = false;
    }

    btn.classList.toggle('liked', isLikedNow);
    btn.innerHTML = `<i class="${isLikedNow ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i> Like`;

    const newCount = isLikedNow ? likes.length + 1 : likes.length - 1;

    document.getElementById(`likeCount-${postId}`).innerHTML =
    `<i class="fa-solid fa-thumbs-up" style="color:#1877f2"></i> ${newCount}`;
};
window.followUser = async (uid) => {
    const btn = document.getElementById(`followBtn-${uid}`);
    const isFollowing = followingList.includes(uid);

    if (isFollowing) {
        await updateDoc(doc(db, "users", currentUserId), {
            following: arrayRemove(uid)
        });

        await updateDoc(doc(db, "users", uid), {
            followers: arrayRemove(currentUserId)
        });

        btn.innerText = "Follow";
        btn.style.background = "#007bff";
        followingList = followingList.filter(id => id !== uid);

    } else {

        await updateDoc(doc(db, "users", currentUserId), {
            following: arrayUnion(uid)
        });

        await updateDoc(doc(db, "users", uid), {
            followers: arrayUnion(currentUserId)
        });

        // নিজের তথ্য নাও
        const mySnap = await getDoc(doc(db, "users", currentUserId));
        const myData = mySnap.data();

        // Follow Notification পাঠাও
        await addDoc(collection(db, "notifications"), {
            to: uid,
            type: "follow",
            from: currentUserId,
            fromName: myData.name,
            fromPhoto: myData.profile,
            text: "started following you",
            read: false,
            createdAt: serverTimestamp()
        });

        btn.innerText = "Following";
        btn.style.background = "#ccc";
        followingList.push(uid);
    }
};
window.filterPosts = function () { currentCategory = document.getElementById("categoryFilter").value; displayedCount = 0; renderAndFilter(); };

window.addEventListener('scroll', () => {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
        let filteredPosts = allPostsBuffer;
        if(currentCategory!== "All"){ filteredPosts = allPostsBuffer.filter(p => p.category === currentCategory); }
        if(displayedCount < filteredPosts.length){ renderAndFilter(); } else { loadFeed(false); }
    }
});
</script>
</body>
</html>
