<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
        font-family: 'Segoe UI', sans-serif; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        padding: 20px;
    }
    .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        max-width: 500px;
        width: 100%;
    }
    .icon {
        font-size: 80px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
    }
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
    h1 {
        font-size: 60px;
        margin-bottom: 10px;
        font-weight: 900;
    }
    h2 {
        font-size: 22px;
        margin-bottom: 15px;
    }
    p {
        font-size: 16px;
        opacity: 0.9;
        margin-bottom: 30px;
        line-height: 1.6;
    }
    .btn {
        display: inline-block;
        padding: 14px 30px;
        background: white;
        color: #764ba2;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.3s;
    }
    .btn:hover {
        transform: scale(1.05);
    }
    .progress {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.3);
        border-radius: 10px;
        margin: 20px 0;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        background: white;
        width: 0%;
        animation: loading 3s infinite;
    }
    @keyframes loading {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 0%; }
    }
</style>
</head>
<body>
<div class="container">
    <div class="icon"><i class="fa-solid fa-hammer"></i></div>
    <h1>404</h1>
    <h2>এই পেজের কাজ চলছে.....</h2>
    <p>আমরা খুব শীঘ্রই এই ফিচারটি নিয়ে আসছি।  
    একটু অপেক্ষা করুন ❤️</p>
    
    <div class="progress"><div class="progress-bar"></div></div>

    <a href="home.html" class="btn"><i class="fa-solid fa-house"></i> Home এ ফিরে যান</a>
</div>

<script>
// 3 সেকেন্ড পর Auto Home এ নিয়ে যাবে
setTimeout(() => {
    // চাইলে Auto Redirect Off করতে পারো
    // window.location.href = 'home.html';
}, 5000);
</script>
</body>
</html>
