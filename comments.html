<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .comment { padding: 10px 0; border-bottom: 1px solid #eee; }
        .comment b { color: #007bff; font-size: 14px; }
        .comment p { margin: 5px 0 0; color: #333; }
        .input-area { margin-top: 20px; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .offline { color: red; text-align: center; font-weight: bold; margin-top: 20px; }
     body{
    padding-bottom:80px;
}

.nav-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 10px rgba(0,0,0,.15);
    z-index:9999;
}

.nav-btn{
    flex:1;
    text-align:center;
    cursor:pointer;
}

.nav-btn i{
    font-size:26px;
    color:#444;
}

.nav-btn:active i{
    color:#007bff;
}
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h3>Comments</h3>
        <div id="commentList">Loading...</div>
        
        <div class="input-area">
            <input type="text" id="commentInput" placeholder="Write a comment...">
            <button onclick="postComment()">Post</button>
        </div>
    </div>
<div class="nav-bar">
    <div class="nav-btn" onclick="window.location.href='home.html'">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='post.html'">
        <i class="fa-solid fa-plus"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='profile.html'">
        <i class="fa-solid fa-user"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='https://ghotimarket.com'">
        <i class="fa-solid fa-store"></i>
    </div>
</div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw",
            authDomain: "mybook-95b97.firebaseapp.com",
            projectId: "mybook-95b97",
            storageBucket: "mybook-95b97.firebasestorage.app",
            messagingSenderId: "689741505296",
            appId: "1:689741505296:web:818d83962a0825f64a7b95"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const postId = new URLSearchParams(window.location.search).get("id");
        const commentList = document.getElementById('commentList');

        // কমেন্ট পোস্ট ফাংশন
        window.postComment = async () => {
            const text = document.getElementById('commentInput').value;
            if(!text) return;

            try {
                await updateDoc(doc(db, "posts", postId), {
                    comments: arrayUnion({
                        text: text,
                        user: auth.currentUser.email,
                        timestamp: new Date().toISOString()
                    })
                });
                location.reload();
            } catch (e) {
                commentList.innerHTML = `<p class="offline">You're currently offline. Please try again later.</p>`;
            }
        };

        // কমেন্ট লোড করার লজিক
        async function loadComments() {
            try {
                const snap = await getDoc(doc(db, "posts", postId));
                const data = snap.data();
                commentList.innerHTML = "";
                
                if (data.comments && data.comments.length > 0) {
                    data.comments.forEach(c => {
                        commentList.innerHTML += `
                            <div class="comment">
                                <b>${c.user}</b>
                                <p>${c.text}</p>
                            </div>`;
                    });
                } else {
                    commentList.innerHTML = "<p>No comments yet.</p>";
                }
            } catch (e) {
                commentList.innerHTML = `<p class="offline">You're currently offline. Please try again later.</p>`;
            }
        }
        loadComments();
    </script>
</body>
</html>
