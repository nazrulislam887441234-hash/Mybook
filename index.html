 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            overflow: hidden;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(30px); }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease;
            z-index: 2;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 25px;
            object-fit: contain;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            color: #333;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }
        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 18px;
        }
        input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #eee;
            border-radius: 15px;
            font-size: 15px;
            box-sizing: border-box;
            background: #f9f9f9;
            transition: 0.3s;
        }
        input:focus {
            border-color: #667eea;
            background: white;
            outline: none;
        }

        .forgot {
            text-align: right;
            margin: 5px 5px 20px;
        }
        .forgot a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 10px;
            transition: 0.3s;
        }

        #loginBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        #loginBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #createAccountBtn {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: white;
        }
        #createAccountBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.4);
        }

        .divider {
            margin: 20px 0;
            color: #aaa;
            font-size: 12px;
        }

        .signup-text {
            color: #888;
            font-weight: 400;
            margin: 20px 0 10px;
            font-size: 14px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <img src="20260609_103856.png" alt="My Book Logo" class="logo">
        <h1>Welcome Back</h1>
        <p class="subtitle">Login to My Book</p>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" placeholder="Enter Your Email address">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Enter Your password">
        </div>

       <p class="forgot">
           <a href="forget-password.html" id="forgotPassword">
            Forgot Password?
           </a>
       </p>

        <button id="loginBtn">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>

        <div class="divider">OR</div>

        <p class="signup-text">Don't have an account?</p>
        <button id="createAccountBtn" onclick="window.location.href='signup-step1.html'">
            <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
    </div>

    <div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged,
    setPersistence,
    browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw",
    authDomain: "mybook-95b97.firebaseapp.com",
    projectId: "mybook-95b97",
    storageBucket: "mybook-95b97.firebasestorage.app",
    messagingSenderId: "689741505296",
    appId: "1:689741505296:web:818d83962a0825f64a7b95"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 Strong login persistence
setPersistence(auth, browserLocalPersistence);

// যদি আগে থেকে লগইন থাকে → সরাসরি home
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "home.html";
    }
});

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

const loginBtn = document.getElementById("loginBtn");

// Enter চাপলে Login
document.getElementById("password").addEventListener("keypress", (e) => {
    if(e.key === "Enter") loginBtn.click();
});

loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        showToast("Email এবং Password দিন");
        return;
    }

    try {
        loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
        loginBtn.disabled = true;

        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "home.html";

    } catch (error) {
        if(error.code === 'auth/user-not-found') showToast("Account পাওয়া যায়নি");
        else if(error.code === 'auth/wrong-password') showToast("Password ভুল");
        else showToast("Login Failed: " + error.message);
        
        loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
        loginBtn.disabled = false;
    }
});
</script>

</body>
</html>
