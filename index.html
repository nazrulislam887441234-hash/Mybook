<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Book - Login</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        .login-container {
            width: 320px;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 200px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 30px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        #loginBtn {
            background-color: #007bff;
            color: white;
        }

        #createAccountBtn {
            background-color: #00ff44;
            color: white;
        }

        .signup-text {
            color: red;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <img src="20260609_103856.png" alt="My Book Logo" class="logo">

        <input type="email" id="email" placeholder="Enter Your Email address">
        <input type="password" id="password" placeholder="Enter Your password">

        <button id="loginBtn">Login</button>

        <p class="signup-text">Don't have an account?</p>
        <button id="createAccountBtn" onclick="window.location.href='next.html'">Create Account</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword, 
    onAuthStateChanged,
    setPersistence,
    browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw",
    authDomain: "mybook-95b97.firebaseapp.com",
    projectId: "mybook-95b97",
    storageBucket: "mybook-95b97.firebasestorage.app",
    messagingSenderId: "689741505296",
    appId: "1:689741505296:web:818d83962a0825f64a7b95"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 Strong login persistence (সব সময় লগইন থাকবে)
setPersistence(auth, browserLocalPersistence);

// যদি আগে থেকে লগইন থাকে → সরাসরি home
onAuthStateChanged(auth, (user) => {
    if (user) {
        window.location.href = "home.html";
    }
});

const loginBtn = document.getElementById("loginBtn");

loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
        alert("Email এবং Password দিন");
        return;
    }

    try {
        loginBtn.innerText = "Loading...";
        loginBtn.disabled = true;

        await signInWithEmailAndPassword(auth, email, password);

        window.location.href = "home.html";

    } catch (error) {
        alert("Login Failed: " + error.message);
        loginBtn.innerText = "Login";
        loginBtn.disabled = false;
    }
});
</script>

</body>
</html>
