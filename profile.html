<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { box-sizing: border-box; }
body { font-family: sans-serif; background: #f9f9f9; margin: 0; display: flex; justify-content: center; padding-bottom:80px; }

.container {
    width: 100%;
    max-width: 400px;
    background: white;
    min-height: 100vh;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    padding-bottom: 20px;
}

.cover { width: 100%; height: 160px; background-size: cover; background-position: center; background-color: #eee; }

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: -60px auto 10px;
    border: 4px solid white;
    display: block;
    object-fit: cover;
}

.user-info { text-align: center; padding: 0 20px; }

.btn-post, .btn-logout {
    width: 90%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    display: block;
    margin: 10px auto;
}

.btn-post { background: #007bff; color: white; }
.btn-logout { background: red; color: white; }

.post-card { border-top: 1px solid #eee; padding: 15px; }

.stats {
    font-size: 13px;
    color: #666;
    margin: 10px 0;
    display: flex;
    gap: 15px;
}

.actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.btn-action {
    padding: 6px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    background: #eee;
}
</style>
</head>

<body>

<div class="container">

<div class="cover" id="coverImg"></div>
<img class="avatar" id="profileImg">

<div class="user-info">
    <h2 id="userName">Loading...</h2>

    <!-- 🔥 FIXED FOLLOWERS -->
    <p>
        Followers:
        <span id="followerCount">0</span>
    </p>

    <button class="btn-post" onclick="window.location.href='post.html'">Create New Post</button>
    <button class="btn-logout" id="logoutBtn">Logout</button>
</div>

<div id="postsList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, onAuthStateChanged, signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
    getFirestore, doc, getDoc, collection, query, where, getDocs, updateDoc, arrayUnion, arrayRemove, increment 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw",
    authDomain: "mybook-95b97.firebaseapp.com",
    projectId: "mybook-95b97",
    storageBucket: "mybook-95b97.firebasestorage.app",
    messagingSenderId: "689741505296",
    appId: "1:689741505296:web:818d83962a0825f64a7b95"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* ================= LOGOUT ================= */
document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

/* ================= LOAD ================= */
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    currentUser = user;

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    if (userSnap.exists()) {
        const data = userSnap.data();

        document.getElementById("userName").innerText = data.name || "User";
        document.getElementById("profileImg").src = data.profile || "";
        document.getElementById("coverImg").style.backgroundImage = `url(${data.cover || ''})`;

        // 🔥 SAFE FOLLOWERS FIX
        const followers = data.followers || [];
        document.getElementById("followerCount").innerText = followers.length;
    }

    loadPosts(user.uid);
});

/* ================= LOAD POSTS ================= */
async function loadPosts(uid) {
    const q = query(collection(db, "posts"), where("uid", "==", uid));
    const snap = await getDocs(q);

    snap.forEach((d) => {
        const post = d.data();

        document.getElementById("postsList").innerHTML += `
        <div class="post-card">
            <img src="${post.imageUrl}" style="width:100%;border-radius:10px;">
            <p>${post.caption || ""}</p>

            <div class="stats">
                <span>❤️ ${post.likes?.length || 0}</span>
                <span>💬 ${post.comments?.length || 0}</span>
                <span>👁️ ${post.views || 0}</span>
            </div>
        </div>`;
    });
}

</script>

</body>
</html>
