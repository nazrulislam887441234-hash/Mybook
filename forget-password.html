<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Book - Password Reset</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .reset-card {
        background: white;
        width: 100%;
        max-width: 450px;
        border-radius: 25px;
        padding: 40px 35px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        text-align: center;
        animation: slideUp 0.6s ease;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
   .logo {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}
.logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 20px;
}
    h1 {
        font-size: 28px;
        font-weight: 900;
        color: #333;
        margin-bottom: 8px;
    }
    p.subtitle {
        color: #888;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .input-group {
        position: relative;
        margin-bottom: 20px;
    }
    .input-group i {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: #aaa;
        font-size: 18px;
    }
    input {
        width: 100%;
        padding: 16px 16px 16px 50px;
        border: 2px solid #eee;
        border-radius: 15px;
        font-size: 15px;
        outline: none;
        transition: 0.3s;
    }
    input:focus {
        border-color: #667eea;
    }
    .btn-reset {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-reset:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
    .back-link {
        margin-top: 25px;
        font-size: 14px;
    }
    .back-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
    }

    /* POPUP */
    .popup-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(5px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }
    .popup {
        background: white;
        padding: 35px 30px;
        border-radius: 20px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        animation: pop 0.4s ease;
    }
    @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
    .popup .icon {
        font-size: 60px;
        color: #238636;
        margin-bottom: 15px;
    }
    .popup h3 {
        font-size: 20px;
        color: #333;
        margin-bottom: 10px;
    }
    .popup p {
        color: #666;
        font-size: 14px;
        line-height: 1.6;
    }
    .popup .btn-close {
        margin-top: 20px;
        padding: 12px 25px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="reset-card">
  <div class="logo">
    <img src="20260609_103856.png" alt="My Book Logo">
</div>
    <h1>My Book</h1>
    <p class="subtitle">Password Reset</p>
    
    <div class="input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="resetEmail" placeholder="Enter your Email">
    </div>
    
    <button class="btn-reset" id="resetBtn" onclick="sendReset()">
        <i class="fa-solid fa-paper-plane"></i> Change Password
    </button>

    <div class="back-link">
        Remember Password? <a href="index.html">Back to Login</a>
    </div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">
    <div class="popup">
        <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3>Email পাঠানো হয়েছে!</h3>
        <p>আপনার ইমেইলে Password Reset লিংক পাঠানো হয়েছে।<br><br>
        লিংকে ক্লিক করে নতুন পাসওয়ার্ড সেট করুন।<br>
        <b>ইমেইল না পেলে Spam ফোল্ডার চেক করুন।</b></p>
        <button class="btn-close" onclick="closePopup()">Got it</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = { 
    apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw", 
    authDomain: "mybook-95b97.firebaseapp.com", 
    projectId: "mybook-95b97", 
    storageBucket: "mybook-95b97.firebasestorage.app", 
    messagingSenderId: "689741505296", 
    appId: "1:689741505296:web:818d83962a0825f64a7b95" 
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.sendReset = async () => {
    const email = document.getElementById('resetEmail').value.trim();
    const btn = document.getElementById('resetBtn');
    
    if(!email) return alert("Email দিন");
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

    try {
        // ✅ Firebase থেকে Reset Email যাবে
        await sendPasswordResetEmail(auth, email);
        document.getElementById('popup').style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Change Password';
    } catch(e) {
        alert("Error: " + e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Change Password';
    }
}

window.closePopup = () => {
    document.getElementById('popup').style.display = 'none';
    window.location.href = 'login.html';
}

// Enter চাপলে Send
document.getElementById('resetEmail').addEventListener('keypress', function(e){
    if(e.key === 'Enter') sendReset();
})
</script>
</body>
</html>
