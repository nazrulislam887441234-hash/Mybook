<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Create Post - My Book</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        :root{
            --primary: #7C3AED;
            --primary-dark: #5B21B6;
            --accent: #FBBF24;
            --bg-dark: #0F0B1E;
            --card: rgba(22, 18, 42, 0.7);
            --text: #FFFFFF;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(124,58,237,0.3);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--bg-dark);
            margin: 0; min-height: 100vh; padding-bottom: calc(90px + env(safe-area-inset-bottom));
            color: var(--text);
        }

       .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(251,191,36,0.1) 0%, transparent 50%),
                        var(--bg-dark);
            z-index: -1;
        }

       .post-container {
            width: 100%; max-width: 540px; margin: 0 auto;
            background: var(--card);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--border);
            min-height: 100vh; border-radius: 0;
            box-shadow: 0 0 80px rgba(124,58,237,0.2);
            animation: fadeIn 0.6s ease;
        }
        @media (min-width: 768px) {.post-container { border-radius: 32px; margin: 30px auto; min-height: calc(100vh - 60px); border: 1px solid var(--border); } }
        @keyframes fadeIn { from {opacity:0; transform: translateY(10px)} to {opacity:1; transform: translateY(0)} }

       .header {
            padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(15,11,30,0.6); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); color: var(--text);
            position: sticky; top: 0; z-index: 10;
            padding-top: calc(18px + env(safe-area-inset-top));
        }
       .header-left { display: flex; align-items: center; gap: 15px; }
       .header i {
            font-size: 20px; cursor: pointer;
            background: rgba(124,58,237,0.2); width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px; transition: 0.3s; border: 1px solid var(--border);
        }
       .header i:active { transform: scale(0.9); background: rgba(124,58,237,0.4); }
       .header h3 { margin: 0; font-size: 20px; font-weight: 700; background: linear-gradient(90deg, #FBBF24, #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
       .draft-btn { font-size: 15px; color: var(--accent); font-weight: 700; cursor: pointer; padding: 8px 16px; border-radius: 12px; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); }

       .content { padding: 24px; }

       .preview-box {
            width: 100%; height: 340px;
            border: 2px dashed var(--border);
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; cursor: pointer; overflow: hidden;
            background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(251,191,36,0.05));
            flex-direction: column; color: var(--text-muted);
            transition: all 0.4s cubic-bezier(.4,0,.2,1);
        }
       .preview-box:active { transform: scale(0.98); }
       .preview-box:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(124,58,237,0.3); }
       .preview-box.has-image { border-style: solid; border-color: var(--primary); }
       .preview-box img { width: 100%; height: 100%; object-fit: cover; }
       .preview-box i { font-size: 60px; margin-bottom: 12px; color: var(--primary); }
       .preview-box.text { font-size: 17px; font-weight: 700; color: var(--text); }
       .preview-box.size { font-size: 13px; margin-top: 8px; color: var(--accent); font-weight: 700; }

        input, select, textarea {
            width: 100%; padding: 16px 20px; margin-bottom: 18px;
            border: 1.5px solid var(--border);
            border-radius: 16px; outline: none; font-size: 16px;
            background: rgba(124,58,237,0.08); color: var(--text);
            backdrop-filter: blur(20px); font-family: 'Hind Siliguri', sans-serif;
            transition: 0.3s;
        }
        input::placeholder, textarea::placeholder { color: var(--text-muted); }
        select option { color: black; background: white; }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary); background: rgba(124,58,237,0.15);
            box-shadow: 0 0 0 4px rgba(124,58,237,0.2);
        }

        #postBtn {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white; border: none; border-radius: 18px;
            font-weight: 700; cursor: pointer; font-size: 18px;
            box-shadow: 0 10px 30px rgba(124,58,237,0.4);
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
            margin-bottom: 10px; letter-spacing: 0.5px;
        }
        #postBtn:active:not(:disabled) { transform: scale(0.97); }
        #postBtn:hover:not(:disabled) { box-shadow: 0 15px 40px rgba(124,58,237,0.6); }
        #postBtn:disabled { background: rgba(255,255,255,0.08); cursor: not-allowed; box-shadow: none; color: var(--text-muted); }

       .progress {
            height: 6px; background: rgba(124,58,237,0.2);
            border-radius: 10px; margin-top: 14px; overflow: hidden; display: none;
        }
       .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            transition: 0.3s; border-radius: 10px;
        }

       .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15,11,30,0.8); backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
        }
       .nav-btn {
            flex: 1; text-align: center; color: var(--text-muted);
            font-size: 22px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
       .nav-btn:active { transform: scale(0.9); }
       .nav-btn.active,.nav-btn:hover { color: var(--accent); }
       .nav-btn span { font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="post-container">
        <div class="header">
            <div class="header-left">
                <i class="fa-solid fa-arrow-left" onclick="window.location.href='post.html'"></i>
                <h3>New Post</h3>
            </div>
            <div class="draft-btn">Draft</div>
        </div>
        <div class="content">

            <input type="file" id="postImage" hidden accept="image/*">
            <div class="preview-box" id="previewBox" onclick="document.getElementById('postImage').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span class="text" id="placeholderText">ছবি যোগ করতে ট্যাপ করুন</span>
                <img id="imagePreview" style="display:none;">
                <div class="size" id="fileSize"></div>
            </div>

            <textarea id="caption" placeholder="ক্যাপশন লিখুন... ✨" rows="4"></textarea>

            <select id="category" onchange="checkForm()">
                <option value="">ক্যাটাগরি সিলেক্ট করুন</option>
                <option value="Tech">Tech</option><option value="News">News</option><option value="Vlog">Vlog</option>
                <option value="Gaming">Gaming</option><option value="Travel">Travel</option><option value="Entertainment">Entertainment</option>
                <option value="Movie">Movie</option><option value="Natok">Natok</option><option value="Funny">Funny</option>
                <option value="Sports">Sports</option><option value="Food & Recipe">Food & Recipe</option><option value="Education">Education</option>
                <option value="Islamic">Islamic</option><option value="Life Style">Life Style</option><option value="Business & Money">Business & Money</option>
                <option value="Freelancing">Freelancing</option>
            </select>

            <div class="progress" id="progressBar"><div class="progress-bar" id="progress"></div></div>
            <button id="postBtn" disabled>Share 🚀</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="window.location.href='foryou.html'"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-btn active" onclick="window.location.href='post.html'"><i class="fa-solid fa-plus"></i><span>Post</span></div>
        <div class="nav-btn" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i><span>Profile</span></div>
        <div class="nav-btn" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i><span>Stats</span></div>
        <div class="nav-btn" onclick="window.location.href='https://ghotimarket.com'"><i class="fa-solid fa-store"></i><span>Shop</span></div>
        <div class="nav-btn" onclick="window.location.href='notification.html'"><i class="fa-solid fa-bell"></i><span>Alert</span></div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp({ apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw", authDomain: "mybook-95b97.firebaseapp.com", projectId: "mybook-95b97", storageBucket: "mybook-95b97.firebasestorage.app" });
    const db = getFirestore(app); const auth = getAuth(app);
    const IMGBB_KEY = "fd8494417e28e4de2384f71202e82d27";
    let compressedFile = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) return window.location.href = "index.html";
    });

    window.checkForm = () => {
        const cat = document.getElementById('category').value;
        document.getElementById('postBtn').disabled =!(cat && compressedFile);
    };

    async function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onerror = reject;
            reader.onload = (e) => {
                const img = new Image();
                img.onerror = reject;
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let { width, height } = img;
                    const MAX = 1280;
                    if (width > MAX) { height *= MAX / width; width = MAX; }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if(!blob) return reject("Canvas toBlob failed");
                        const newFile = new File([blob], "compressed.webp", { type: "image/webp" });
                        resolve(newFile);
                    }, "image/webp", 0.75);
                };
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('postImage').onchange = async (e) => {
        const file = e.target.files[0]; if(!file) return;
        document.getElementById('placeholderText').innerText = "Optimizing...";

        try {
            compressedFile = await compressImage(file);
            const previewURL = URL.createObjectURL(compressedFile);
            const img = document.getElementById('imagePreview');
            img.src = previewURL;
            img.style.display = 'block';
            document.getElementById('previewBox').classList.add('has-image');
            document.getElementById('placeholderText').style.display = 'none';
            document.getElementById('fileSize').innerText = `${(compressedFile.size/1024).toFixed(1)} KB • WebP`;
            checkForm();
        } catch(err) {
            alert("Image Error: " + err);
            document.getElementById('placeholderText').innerText = "Tap to add photo";
        }
    };

    document.getElementById('postBtn').onclick = async () => {
    const caption = document.getElementById('caption').value;
    const category = document.getElementById('category').value;
    const btn = document.getElementById('postBtn');
    btn.innerText = "Posting...";
    btn.disabled = true;
    document.getElementById('progressBar').style.display = 'block';

    try {
        const fd = new FormData();
        fd.append("image", compressedFile);
        document.getElementById('progress').style.width = '50%';

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
        const data = await res.json();
        if (!data.success) throw new Error("Image upload failed.");
        document.getElementById('progress').style.width = '85%';

        const userSnap = await getDoc(doc(db, "users", auth.currentUser.uid));
        const userData = userSnap.data();

        const postRef = await addDoc(collection(db, "posts"), {
            uid: auth.currentUser.uid,
            userName: userData.userName,
            userPhoto: userData.userPhoto,
            imageUrl: data.data.url,
            caption: caption,
            category: category,
            privacy: "public",
            isMonetized: userData.isMonetized || false,
            createdAt: serverTimestamp(),
            likes: [],
            views: [],
            commentsCount: 0
        });

        const newPostId = postRef.id;
        const followers = userData.followers || [];

        for (const followerId of followers) {
            await addDoc(collection(db, "notifications"), {
                to: followerId,
                type: "new_post",
                from: auth.currentUser.uid,
                fromName: userData.userName,
                fromPhoto: userData.userPhoto,
                text: "uploaded a new post",
                postId: newPostId,
                read: false,
                createdAt: serverTimestamp()
            });
        }

        document.getElementById('progress').style.width = '100%';
        setTimeout(() => window.location.href = "home.html", 300);

    } catch (err) {
        alert("Upload failed: " + err.message);
        btn.innerText = "Share 🚀";
        btn.disabled = false;
        document.getElementById('progressBar').style.display = 'none';
    }
};
    </script>
</body>
</html>
