<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; margin: 0; padding-bottom:80px; }
        .edit-container { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { color: #333; margin-bottom: 20px; text-align: center; }
        #postImage { width:100%; border-radius:12px; margin-bottom:15px; display:none; object-fit:cover; }
        #editCaption { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.3s; margin-bottom: 5px; }
        #editCaption:focus { border-color: #007bff; }
        #charCount { text-align: right; font-size: 12px; color: #888; margin-bottom: 15px; }
        .btn-group { display:flex; gap:10px; }
        .btn { flex:1; padding: 15px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #saveBtn { background: #007bff; color: white; }
        #cancelBtn { background: #f0f2f5; color: #333; }
        .loading { text-align: center; color: #888; font-size: 14px; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 20px; border-radius: 25px; z-index: 9999; opacity: 0; transition: 0.3s; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .nav-bar{ position:fixed; bottom:0; left:0; width:100%; height:65px; background:#fff; display:flex; justify-content:space-around; align-items:center; box-shadow:0 -2px 10px rgba(0,0,0,.15); z-index:9999; }
        .nav-btn{ flex:1; text-align:center; cursor:pointer; }
        .nav-btn i{ font-size:26px; color:#444; }
    </style>
</head>
<body>

    <div class="edit-container">
        <h3>পোস্ট এডিট করুন</h3>
        <p class="loading" id="status">Loading data...</p>
        <img id="postImage">
        <input type="text" id="editCaption" placeholder="Write new caption..." maxlength="500">
        <p id="charCount">0/500</p>
        <div class="btn-group">
            <button class="btn" id="cancelBtn">Cancel</button>
            <button class="btn" id="saveBtn">Save Changes</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="window.location.href='home.html'"><i class="fa-solid fa-house"></i></div>
        <div class="nav-btn" onclick="window.location.href='post.html'"><i class="fa-solid fa-plus"></i></div>
        <div class="nav-btn" onclick="window.location.href='profile.html'"><i class="fa-solid fa-user"></i></div>
        <div class="nav-btn" onclick="window.location.href='dashboard.html'"><i class="fa-solid fa-chart-line"></i></div>
        <div class="nav-btn" onclick="window.location.href='https://ghotimarket.com'"><i class="fa-solid fa-store"></i></div>
        <div class="nav-btn" onclick="window.location.href='notification.html'"><i class="fa-solid fa-bell"></i></div>
    </div> 

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
const firebaseConfig = { apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw", authDomain: "mybook-95b97.firebaseapp.com", projectId: "mybook-95b97", storageBucket: "mybook-95b97.firebasestorage.app", messagingSenderId: "689741505296", appId: "1:689741505296:web:818d83962a0825f64a7b95" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const postId = new URLSearchParams(window.location.search).get("id");
let currentUserId = "";

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

onAuthStateChanged(auth, async (user) => {
    if(!user) window.location.href = 'index.html';
    currentUserId = user.uid;
    loadPost();
});

async function loadPost() {
    try {
        const docSnap = await getDoc(doc(db, "posts", postId));
        if(docSnap.exists()) {
            const postData = docSnap.data();
            if(postData.uid !== currentUserId){
                showToast("এটা আপনার পোস্ট না");
                window.location.href = 'profile.html';
                return;
            }
            document.getElementById('postImage').src = postData.imageUrl;
            document.getElementById('postImage').style.display = 'block';
            document.getElementById('editCaption').value = postData.caption;
            document.getElementById('charCount').innerText = `${postData.caption.length}/500`;
            document.getElementById('status').innerText = "";
        } else {
            showToast("পোস্ট পাওয়া যায়নি!");
            window.location.href = 'profile.html';
        }
    } catch (e) {
        showToast("এরর: " + e.message);
    }
}

document.getElementById('editCaption').onkeyup = (e) => {
    document.getElementById('charCount').innerText = `${e.target.value.length}/500`;
}

document.getElementById('cancelBtn').onclick = () => history.back();

document.getElementById('saveBtn').onclick = async () => {
    const caption = document.getElementById('editCaption').value.trim();
    if(!caption) return showToast("Caption ফাকা রাখা যাবে না");

    const btn = document.getElementById('saveBtn');
    btn.innerText = "Saving...";
    btn.disabled = true;

    try {
        await updateDoc(doc(db, "posts", postId), { 
            caption: caption,
            isEdited: true,
            editedAt: serverTimestamp()
        });
        showToast("পোস্ট আপডেট হয়েছে!");
        setTimeout(() => window.location.href = 'profile.html', 1000);
    } catch (e) {
        showToast("আপডেট করতে সমস্যা: " + e.message);
        btn.innerText = "Save Changes";
        btn.disabled = false;
    }
};
</script>
</body>
</html>
