<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f9f9f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .edit-container { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h3 { color: #333; margin-bottom: 20px; text-align: center; }
        
        #editCaption { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: border 0.3s; margin-bottom: 20px; }
        #editCaption:focus { border-color: #007bff; }
        
        #saveBtn { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        #saveBtn:hover { background: #0056b3; }
        
        .loading { text-align: center; color: #888; font-size: 14px; }
        body{
    padding-bottom:80px;
}

.nav-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:65px;
    background:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    box-shadow:0 -2px 10px rgba(0,0,0,.15);
    z-index:9999;
}

.nav-btn{
    flex:1;
    text-align:center;
    cursor:pointer;
}

.nav-btn i{
    font-size:26px;
    color:#444;
}

.nav-btn:active i{
    color:#007bff;
}
    </style>
</head>
<body>

    <div class="edit-container">
        <h3>পোস্ট এডিট করুন</h3>
        <p class="loading" id="status">Loading data...</p>
        <input type="text" id="editCaption" placeholder="Write new caption...">
        <button id="saveBtn">Save Changes</button>
    </div>
      <div class="nav-bar">
    <div class="nav-btn" onclick="window.location.href='home.html'">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='post.html'">
        <i class="fa-solid fa-plus"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='profile.html'">
        <i class="fa-solid fa-user"></i>
    </div>

    <div class="nav-btn" onclick="window.location.href='https://ghotimarket.com'">
        <i class="fa-solid fa-store"></i>
    </div>
</div> 
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDgqisJ-iCXmlINKKtQv8EiKSoSp7or6vw",
            authDomain: "mybook-95b97.firebaseapp.com",
            projectId: "mybook-95b97",
            storageBucket: "mybook-95b97.firebasestorage.app",
            messagingSenderId: "689741505296",
            appId: "1:689741505296:web:818d83962a0825f64a7b95"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const postId = new URLSearchParams(window.location.search).get("id");
        
        async function loadPost() {
            try {
                const docSnap = await getDoc(doc(db, "posts", postId));
                if(docSnap.exists()) {
                    document.getElementById('editCaption').value = docSnap.data().caption;
                    document.getElementById('status').innerText = "";
                } else {
                    alert("পোস্ট পাওয়া যায়নি!");
                    window.location.href = 'profile.html';
                }
            } catch (e) {
                alert("এরর: " + e.message);
            }
        }
        loadPost();

        document.getElementById('saveBtn').onclick = async () => {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "posts", postId), { 
                    caption: document.getElementById('editCaption').value 
                });
                alert("আপনার পোস্টটি সফলভাবে আপডেট করা হয়েছে!");
                window.location.href = 'profile.html';
            } catch (e) {
                alert("আপডেট করতে সমস্যা হয়েছে: " + e.message);
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
